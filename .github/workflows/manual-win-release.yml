name: Manual Windows EXE Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      release_name:
        description: 'Release title (optional, default: tag_name)'
        required: false
        type: string
      draft:
        description: 'Create as draft release'
        required: true
        default: true
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows packages
        run: npm run pack:win

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
